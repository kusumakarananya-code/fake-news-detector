<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake News Detector</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


</head>

<body>

<div class="navbar">
<div class="logo">Fake News Detector</div>
<div class="nav-links">
<a href="/">Home</a>
<a href="/login">Login</a>
<a href="/register">Register</a>
</div>
</div>

<div class="container">
<div class="card">
<h2>Check News Authenticity</h2>
<textarea placeholder="Paste your news here..."></textarea>
<button onclick="predictNews()">Check Now</button>
<div class="result" id="result"></div>
</div>
</div>

<script>

async function predictNews(){

let news =
document.querySelector("textarea").value;

let resultBox =
document.getElementById("result");

resultBox.innerHTML =
"🔍 Checking authenticity...";


let response =
await fetch("/predict",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
news:news
})

});


let data =
await response.json();


resultBox.innerHTML =
data.prediction + " (" + data.confidence + "% confidence)";


if(data.prediction=="Fake News"){

resultBox.style.color="red";

}

else{

resultBox.style.color="green";

}

}

</script>

</body>
</html>
