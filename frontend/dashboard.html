<!DOCTYPE html>
<html>
<head><title>Dashboard</title><link rel="stylesheet" href="style.css"></head>
<body>
<h1>History Dashboard</h1>
<ul id="history"></ul>

<script>
fetch("https://fake-news-detector-8-v7qs.onrender.com/history")
.then(res=>res.json())
.then(data=>{
  let list = document.getElementById("history");
  data.forEach(item=>{
    let li = document.createElement("li");
    li.innerText = item[1] + " => " + item[2];
    list.appendChild(li);
  })
})
</script>
</body>
</html>
